            features_position: bottom
          - type: tile
            entity: switch.ALPHA_PREFIX_gen_charge_point_2
            name: Gen 2
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.ALPHA_PREFIX_grid_charge_point_3
            name: Grid 3
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.ALPHA_PREFIX_gen_charge_point_3
            name: Gen 3
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.ALPHA_PREFIX_grid_charge_point_4
            name: Grid 4
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.ALPHA_PREFIX_gen_charge_point_4
            name: Gen 4
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.ALPHA_PREFIX_grid_charge_point_5
            name: Grid 5
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.ALPHA_PREFIX_gen_charge_point_5
            name: Gen 5
