              essential_load2: sensor.smart_plug_2_moc
              essential_load3: sensor.smart_plug_3_moc
              use_timer_248: switch.ALPHA_PREFIX_use_timer
              priority_load_243: sensor.ALPHA_PREFIX_load_power
              inverter_voltage_154: sensor.ALPHA_PREFIX_ac_output_voltage
              load_frequency_192: sensor.ALPHA_PREFIX_ac_output_frequency
              inverter_current_164: sensor.ALPHA_PREFIX_current
              inverter_power_175: sensor.ALPHA_PREFIX_power
              grid_connected_status_194: sensor.ALPHA_PREFIX_grid_voltage
              inverter_status_59: sensor.ALPHA_PREFIX_device_mode
              day_battery_discharge_71: sensor.ALPHA_PREFIX_battery_energy_out
              battery_voltage_183: sensor.ALPHA_PREFIX_battery_voltage
              battery_power_190: sensor.ALPHA_PREFIX_battery_power
              battery_current_191: sensor.ALPHA_PREFIX_battery_current
              grid_power_169: sensor.ALPHA_PREFIX_grid_power
              day_grid_export_77: sensor.ALPHA_PREFIX_grid_energy_out
              grid_ct_power_172: sensor.ALPHA_PREFIX_grid_power_ct
              day_load_energy_84: sensor.ALPHA_PREFIX_load_energy
              pv1_power_186: sensor.ALPHA_PREFIX_auxiliary_pv_power
              pv2_power_187: sensor.ALPHA_PREFIX_pv_power_2
              day_grid_import_76: sensor.ALPHA_PREFIX_grid_energy_in
              grid_ct_power_total: sensor.ALPHA_PREFIX_grid_power_ct
              battery_temp_182: sensor.ALPHA_PREFIX_battery_temperature
              day_aux_energy: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
              essential_power: sensor.ALPHA_PREFIX_load_power
              radiator_temp_91: sensor.ALPHA_PREFIX_temperature
              dc_transformer_temp_90: sensor.magazyn_pomieszczenie_temperatura
              solar_sell_247: switch.brak_encji
              day_battery_charge_70: sensor.ALPHA_PREFIX_battery_energy_in
              battery_soc_184: sensor.ALPHA_PREFIX_state_of_charge
              battery_rated_capacity: sensor.ALPHA_PREFIX_capacity
              battery_shutdown_soc: number.ALPHA_PREFIX_output_shutdown_capacity
