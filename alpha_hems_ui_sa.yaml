# =============================================================
# ALPHA HEMS: CENTRALNY INTERFEJS UŻYTKOWNIKA (v1.10 - SOLAR ASSISTANT)
# STATUS: PRODUKCYJNY / EKSPORTOWY (Universal Dashboard)
#
# HISTORIA WERSJI:
# - v1.10: Wdrożenie wizytówki STATUS LICENCJI (input_text.alpha_rce_stan_15) w panelu Monitor Systemu.
# - v1.09: Fix matematyki baterii (invert_power: true). Pełne wdrożenie ALPHA_PREFIX, 
#          w tym poprawka dla monitoringu faz. Usunięto zbędne przyciski diagnostyczne.
# - v1.06: Wdrożenie znacznika ALPHA_PREFIX. Dashboard w 100% uniwersalny.
# =============================================================

title: ALPHA HEMS
icon: mdi:solar-power
views:
