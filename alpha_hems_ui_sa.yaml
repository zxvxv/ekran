              - **Środa:** {{ states('input_number.alpha_rce_param_33') }} kWh
              - **Czwartek:** {{ states('input_number.alpha_rce_param_34') }} kWh
              - **Piątek:** {{ states('input_number.alpha_rce_param_35') }} kWh
              - **Sobota:** {{ states('input_number.alpha_rce_param_36') }} kWh
              - **Niedziela:** {{ states('input_number.alpha_rce_param_37') }} kWh

          - type: entities
            title: ⚡ Monitoring Napięcia Fazy
            entities:
              - entity: sensor.ALPHA_PREFIX_grid_voltage_1
                name: Faza L1
              - entity: sensor.ALPHA_PREFIX_grid_voltage_2
                name: Faza L2
              - entity: sensor.ALPHA_PREFIX_grid_voltage_3
                name: Faza L3
              - type: section
              - entity: input_boolean.alpha_rce_flaga_10
                name: 🔄 WYMUŚ ALPHA SYNC / SETUP
                icon: mdi:tools
              - entity: input_boolean.alpha_rce_flaga_11
                name: 🚀 NOWE OPOMIAROWANIE (ZASTRZYK DANYCH)
                icon: mdi:database-refresh
