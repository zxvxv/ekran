# =============================================================
# ALPHA HEMS: CENTRALNY INTERFEJS UŻYTKOWNIKA (vXXX - OMNI)
# STATUS: WERSJA TESTOWA / BAZA DLA WIRTUALNYCH OKIEN
#
# HISTORIA WERSJI:
# - vXXX: (OMNI) Usunięcie sprzętowego modułu TOU. Wdrożenie Wirtualnych 
#         Okien Czasowych dla uniwersalnego silnika.
# - v1.15: Zmiana formatowania szufladek finansowych.
# =============================================================

title: ALPHA HEMS vXXX
icon: mdi:solar-power-variant
views:
  # =============================================================
  # ZAKŁADKA 1: ⚡ SYSTEM (Infrastruktura i Wirtualne Okna)
  # =============================================================
  - type: sections
    max_columns: 5
    title: SYSTEM OMNI
    path: system-omni
    dense_section_placement: false
    top_margin: true
    header:
      layout: responsive
      badges_position: bottom
      badges_wrap: scroll
    sections:
      - type: grid
        column_span: 2
        cards:
          # UWAGA: Karta graficzna pozostawiona ze sztywnymi encjami Deye 
          # w celu zachowania układu wizualnego.
          - cardstyle: lite
            wide: false
            large_font: true
            show_solar: true
            show_battery: true
            show_grid: true
            center_no_grid: true
            card_height: '750'
            card_width: 100%
            decimal_places: 2
            decimal_places_energy: 1
            dynamic_line_width: true
            max_line_width: 4
            min_line_width: 1
            inverter:
              three_phase: true
              auto_scale: true
              modern: true
              colour: '#217cb5'
              autarky: power
            battery:
              show_daily: true
              auto_scale: true
              show_absolute: true
              colour: '#c01b1b'
              charge_colour: '#435bd0'
              dynamic_colour: true
              linear_gradient: true
              show_remaining_energy: true
              energy: 47616
              shutdown_soc: 6
            battery2:
              energy: 0
              shutdown_soc: 20
              soc_end_of_charge: 100
              invert_power: false
              hide_soc: false
              colour: '#ffc0cb'
              show_remaining_energy: true
              remaining_energy_to_shutdown: false
              show_absolute: false
              auto_scale: true
              dynamic_colour: true
              linear_gradient: true
              animate: true
              path_threshold: 100
              navigate: ''
              invert_flow: false
            solar:
              show_daily: true
              mppts: 3
              pv1_name: S_Edge
              auto_scale: true
              colour: '#c9cc05'
              pv1_max_power: 7400
              display_mode: 2
            load:
              show_daily: true
              dynamic_icon: true
              dynamic_colour: true
              colour: '#2cce6a'
              show_absolute_aux: true
              auto_scale: true
              additional_loads: 1
              load1_name: Gwarantowane
              load1_icon: mdi:calendar-text
              load2_name: Pozostało PV
              load2_icon: mdi:solar-power-variant
              essential_name: UPS
            grid:
              show_daily_buy: true
              show_daily_sell: true
              show_nonessential: true
              auto_scale: true
              colour: '#2a95cb'
              export_colour: '#e0c124'
            type: custom:sunsynk-power-flow-card
            grid_options:
              columns: full
              rows: 1
            entities:
              remaining_solar: sensor.solcast_pv_forecast_pozostala_prognoza_na_dzis
              energy_prognoza_106: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
              day_pv_energy_108: sensor.deye_inverter_daily_pv_production
              essential_load1: sensor.deye_inverter_load_ups_power
              essential_load1_extra: sensor.dobowe_zuzycie_ups
              essential_load2: sensor.smart_plug_2_moc
              essential_load3: sensor.smart_plug_3_moc
              use_timer_248: switch.sunsynk_toggle_system_timer
              priority_load_243: sensor.deye_inverter_load_power
              inverter_voltage_154: sensor.deye_inverter_output_l1_voltage
              load_frequency_192: sensor.deye_inverter_load_frequency
              inverter_current_164: sensor.deye_inverter_output_l1_current
              inverter_power_175: sensor.sunsynk_inverter_power
              grid_connected_status_194: binary_sensor.sunsynk_grid_connected_status
              inverter_status_59: sensor.sunsynk_overall_state
              day_battery_discharge_71: sensor.deye_inverter_daily_battery_discharge
              battery_voltage_183: sensor.deye_inverter_battery_bms_voltage
              battery_power_190: sensor.deye_inverter_battery_power
              battery_current_191: sensor.deye_inverter_battery_bms_current
              grid_power_169: sensor.sunsynk_grid_power
              day_grid_export_77: sensor.deye_inverter_daily_energy_sold
              grid_ct_power_172: sensor.deye_inverter_grid_l1_power
              day_load_energy_84: sensor.deye_inverter_daily_load_consumption
              pv1_power_186: sensor.deye_inverter_pv1_power
              pv2_power_187: sensor.deye_inverter_pv2_power
              pv3_power_188: sensor.deye_inverter_generator_power_total
              day_grid_import_76: sensor.deye_inverter_daily_energy_bought
              grid_ct_power_total: sensor.deye_inverter_external_ct_power
              battery_temp_182: sensor.deye_inverter_battery_temperature
              day_aux_energy: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
              essential_power: sensor.deye_inverter_load_power
              radiator_temp_91: sensor.deye_inverter_ac_temperature
              dc_transformer_temp_90: sensor.magazyn_pomieszczenie_temperatura
              solar_sell_247: switch.deye_inverter_solar_sell
              day_battery_charge_70: sensor.deye_inverter_daily_battery_charge
              battery_soc_184: sensor.deye_inverter_battery
              battery_rated_capacity: number.deye_inverter_battery_capacity
              battery_shutdown_soc: number.deye_inverter_battery_shutdown_soc_low_dc
      - type: grid
        cards:
          # ==========================================
          # NOWY MODUŁ: WIRTUALNE OKNA (OMNI)
          # ==========================================
          - type: entities
            title: ⚙️ Wirtualne Okna Czasowe
            show_header_toggle: false
            state_color: true
            entities:
              - type: section
                label: "Okno Taniej Energii #1"
              - entity: input_boolean.alpha_window_1_active
              - entity: input_datetime.alpha_window_1_start
              - entity: input_datetime.alpha_window_1_end
              - type: section
                label: "Okno Taniej Energii #2"
              - entity: input_boolean.alpha_window_2_active
              - entity: input_datetime.alpha_window_2_start
              - entity: input_datetime.alpha_window_2_end
              - type: section
                label: "Okno Taniej Energii #3"
              - entity: input_boolean.alpha_window_3_active
              - entity: input_datetime.alpha_window_3_start
              - entity: input_datetime.alpha_window_3_end
      - type: grid
        cards:
          - type: entities
            title: ☀️ Prognoza Solcast (7 dni)
            show_header_toggle: false
            entities:
              - entity: sensor.solcast_pv_forecast_pozostala_prognoza_na_dzis
                name: Pozostało na dziś
                icon: mdi:solar-power
              - type: divider
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
                name: Dziś (Całkowita)
                icon: mdi:weather-sunny
              - entity: sensor.solcast_pv_forecast_prognoza_na_jutro
                name: Jutro
                icon: mdi:weather-partly-cloudy
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_3
                name: Pojutrze
                icon: mdi:calendar-clock
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_4
                name: Za 3 dni
                icon: mdi:calendar-clock
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_5
                name: Za 4 dni
                icon: mdi:calendar-clock
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_6
                name: Za 5 dni
                icon: mdi:calendar-clock
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_7
                name: Za 6 dni
                icon: mdi:calendar-clock

  # =============================================================
  # ZAKŁADKA 2: 📈 GIEŁDA (RCE IntegraSoft)
  # =============================================================
  - type: sidebar
    path: rce_integra
    title: RCE_IntegraSoft
    icon: mdi:chart-line
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:apexcharts-card
            graph_span: 24h
            update_interval: 1min
            header:
              show: true
              title: 'Alpha: Monitor Sprzedaży'
              show_states: true
              colorize_states: true
            span:
              start: day
            now:
              show: true
              label: TERAZ
              color: '#e74c3c'
            series:
              - entity: sensor.deye_inverter_grid_power
                name: Moc Sieci
                unit: ' W'
                color: '#9b59b6'
                show:
                  in_chart: false
                  in_header: true
              - entity: input_number.alpha_rce_param_01
                name: Cena Teraz
                unit: ' zł'
                float_precision: 2
                show:
                  in_chart: false
                  in_header: true
              - entity: input_number.alpha_rce_param_03
                name: Mój Próg
                unit: ' zł'
                color: '#e67e22'
                float_precision: 2
                show:
                  in_chart: false
                  in_header: true
              - entity: sensor.alpha_pse_dzisiaj_2
                name: Zarabiam
                type: column
                color: '#2ecc71'
                opacity: 0.4
                float_precision: 2
                show:
                  in_header: false
                data_generator: >
                  const data = entity.attributes.value || entity.attributes.prices;
                  if (!data) return [];  const p = parseFloat(hass.states['input_number.alpha_rce_param_03'].state) || 0.7; return data.map((entry) => {
                    const val = entry.rce_pln !== undefined ? entry.rce_pln : (entry.cen_cost !== undefined ? entry.cen_cost : (entry.price || 0));
                    const c = parseFloat(val) / 1000;
                    const tsStr = String(entry.dtime).replace(' ', 'T');
                    return [new Date(tsStr).getTime(), c >= p ? c : 0];
                  });
              - entity: sensor.alpha_pse_dzisiaj_2
                name: Ceny na dziś
                type: line
                curve: stepline
                stroke_width: 2
                color: '#3498db'
                float_precision: 2
                show:
                  in_header: false
                data_generator: >
                  const data = entity.attributes.value || entity.attributes.prices;
                  if (!data) return []; return data.map((entry) => {
                    const val = entry.rce_pln !== undefined ? entry.rce_pln : (entry.cen_cost !== undefined ? entry.cen_cost : (entry.price || 0));
                    const c = parseFloat(val) / 1000;
                    const tsStr = String(entry.dtime).replace(' ', 'T');
                    return [new Date(tsStr).getTime(), c];
                  });
          - type: horizontal-stack
            cards:
              - type: entities
                title: Monitor Systemu
                show_header_toggle: false
                entities:
                  - entity: input_text.alpha_rce_stan_01
                    name: DECYZJA MÓZGU
                    icon: mdi:brain
                    type: simple-entity
                  - entity: input_text.alpha_rce_stan_03
                    name: AKTUALNY STATUS
                    icon: mdi:robot-outline
                    type: simple-entity
                  - type: divider
                  - entity: input_text.alpha_rce_stan_15
                    name: STATUS LICENCJI
                    icon: mdi:shield-key
                    type: simple-entity
                  - entity: sensor.alpha_licencja_wygasa
                    name: WAŻNA DO
                    icon: mdi:calendar-clock
                    type: simple-entity
                  - type: divider
                  - entity: sensor.deye_inverter_battery_bms_soc
                    name: Aktualny SOC Magazynu
                    icon: mdi:battery-high
                  - entity: input_number.alpha_rce_param_20
                    name: Docelowy SOC (Płotek)
                    icon: mdi:battery-clock
                    type: simple-entity
                  - entity: input_number.alpha_rce_param_04
                    name: Energia do Sprzedaży
                    icon: mdi:battery-arrow-up
                    type: simple-entity
              - type: entities
                title: Finanse i Zyski
                show_header_toggle: false
                entities:
                  - entity: input_number.alpha_rce_param_02
                    name: Koszt zakupu (+straty)
                    icon: mdi:cash-minus
                    type: simple-entity
                  - entity: input_number.alpha_rce_param_03
                    name: Próg sprzedaży (+marża)
                    icon: mdi:target
                    type: simple-entity
                  - type: divider
                  - entity: input_number.alpha_rce_param_05
                    name: Szacowany Zysk (Dziś)
                    icon: mdi:piggy-bank
                    type: simple-entity
                  - type: divider
                  - entity: input_number.alpha_rce_param_44
                    name: Zrealizowany (Miesiąc)
                    icon: mdi:chart-bar
                    type: simple-entity
                  - entity: input_number.alpha_rce_param_45
                    name: Zrealizowany (Rok)
                    icon: mdi:chart-line
                    type: simple-entity
                  - entity: input_number.alpha_rce_param_43
                    name: Całkowity Zwrot (Total)
                    icon: mdi:cash-multiple
                    type: simple-entity
      - type: custom:apexcharts-card
        graph_span: 24h
        update_interval: 1min
        header:
          show: true
          title: 'Alpha: Plan Sprzedaży - JUTRO'
          show_states: true
          colorize_states: true
        span:
          start: day
          offset: +1d
        series:
          - entity: sensor.alpha_pse_jutro_2
            name: Min
            unit: ' zł'
            float_precision: 2
            show:
              in_chart: false
              in_header: true
            data_generator: >
              const d = entity.attributes.value; if (!d) return []; const min = Math.min(...d.map(e => e.rce_pln / 1000)); return [[new Date(d[0].dtime.replace(/-/g, '/')).getTime(), min]];
          - entity: sensor.alpha_pse_jutro_2
            name: Max
            unit: ' zł'
            float_precision: 2
            show:
              in_chart: false
              in_header: true
            data_generator: >
              const d = entity.attributes.value; if (!d) return []; const max = Math.max(...d.map(e => e.rce_pln / 1000)); return [[new Date(d[0].dtime.replace(/-/g, '/')).getTime(), max]];
          - entity: sensor.alpha_pse_jutro_2
            name: Zysk (Plan)
            type: column
            color: '#2ecc71'
            opacity: 0.4
            show:
              in_header: false
            data_generator: >
              const data = entity.attributes.value; if (!data) return []; const p = parseFloat(hass.states['input_number.alpha_rce_param_03'].state) || 0.7; return data.map((entry) => {
                const c = entry.rce_pln / 1000;
                return [new Date(entry.dtime.replace(/-/g, '/')).getTime(), c >= p ? c : 0];
              });
          - entity: sensor.alpha_pse_jutro_2
            name: Giełda Jutro
            type: line
            curve: stepline
            color: '#3498db'
            show:
              in_header: false
            data_generator: >
              const data = entity.attributes.value; if (!data) return []; return data.map((entry) => {
                return [new Date(entry.dtime.replace(/-/g, '/')).getTime(), entry.rce_pln / 1000];
              });

  # =============================================================
  # ZAKŁADKA 3: 🏠 DOM (Centrum Dowodzenia i Szufladki)
  # =============================================================
  - type: panel
    path: dom
    title: DOM
    icon: mdi:home
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
