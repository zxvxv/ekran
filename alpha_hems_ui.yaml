# =============================================================
  # ZAKŁADKA 1: 🎛️ PRZEGLĄD (PULPIT GŁÓWNY) - v1.01 (Wersja Light)
  # ZMIANY: 
  # - Usunięto Kartę Przepływu (Sunsynk)
  # - Usunięto suwaki prądów ładowania
  # - Usunięto przełącznik pogody Alpha i przyciski sterujące
  # - Zostawiono: Raport księgowego, Czas, Dni do balansu, Zastrzyk, Solcast
  # =============================================================
  - type: panel
    path: przeglad
    title: Przegląd
    icon: mdi:view-dashboard
    cards:
      - type: vertical-stack
        cards:
          # --- SEKCJA 1: STATUS I RAPORT KSIĘGOWEGO ---
          - type: horizontal-stack
            cards:
              - type: entities
                title: ⚡ Status Falownika
                show_header_toggle: false
                entities:
                  - entity: sensor.deye_inverter_device_date_time
                    name: Czas Urządzenia
                    icon: mdi:clock-outline
                  - entity: sensor.dni_od_100
                    name: Dni od 100% (Balansowanie)
                    icon: mdi:battery-sync
                  - entity: button.zastrzyk_danych
                    name: Zastrzyk Danych
                    icon: mdi:database-import

              - type: entities
                title: 📊 Raport Księgowego
                show_header_toggle: false
                entities:
                  - entity: sensor.deye_inverter_daily_energy_sold
                    name: Sprzedaż do sieci
                    icon: mdi:transmission-tower-export
                  - entity: sensor.deye_inverter_daily_energy_bought
                    name: Zakup z sieci
                    icon: mdi:transmission-tower-import
                  - entity: sensor.deye_inverter_daily_pv_production
                    name: Produkcja PV
                    icon: mdi:solar-power
                  - entity: sensor.deye_inverter_daily_load_consumption
                    name: Zużycie Domu
                    icon: mdi:home-lightning-bolt

          # --- SEKCJA 2: PROGNOZA SOLCAST (7 DNI) ---
          - type: entities
            title: ☀️ Prognoza Solcast (7 Dni)
            show_header_toggle: false
            entities:
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
                name: Dzisiaj
                icon: mdi:weather-sunny
              - entity: sensor.solcast_pv_forecast_prognoza_na_jutro
                name: Jutro
                icon: mdi:weather-partly-cloudy
              - entity: sensor.solcast_pv_forecast_prognoza_na_pojutrze
                name: Pojutrze
                icon: mdi:weather-cloudy
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_4
                name: Dzień 4
                icon: mdi:calendar-blank
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_5
                name: Dzień 5
                icon: mdi:calendar-blank
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_6
                name: Dzień 6
                icon: mdi:calendar-blank
              - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_7
                name: Dzień 7
                icon: mdi:calendar-blank

  # =============================================================
  # ZAKŁADKA 2: 🔋 BATERIE I ZARZĄDZANIE
  # =============================================================
  - type: panel
    path: rce_integra
    title: RCE_IntegraSoft
    icon: mdi:chart-line
    cards:
      - type: vertical-stack
        cards:
          - type: custom:apexcharts-card
            graph_span: 48h
            update_interval: 1min
            apex_config:
              chart:
                height: 400
            header:
              show: true
              title: 'Alpha: Monitor Sprzedaży (48H)'
              show_states: true
              colorize_states: true
            span:
              start: day
            now:
              show: true
              label: TERAZ
              color: '#e74c3c'
            series:
              - entity: sensor.alpha_hems_siec_moc_calkowita
                name: Moc Sieci
                unit: ' W'
                color: '#9b59b6'
                show:
                  in_chart: false
                  in_header: true
              - entity: input_number.alpha_rce_param_01
                name: Cena Teraz
                unit: ' zł'
                float_precision: 2
                show:
                  in_chart: false
                  in_header: true
              - entity: input_number.alpha_rce_param_03
                name: Mój Próg
                unit: ' zł'
                color: '#e67e22'
                float_precision: 2
                show:
                  in_chart: false
                  in_header: true
              - entity: sensor.alpha_pse_jutro_2
                name: Min Jutro
                unit: ' zł'
                float_precision: 2
                show:
                  in_chart: false
                  in_header: true
                data_generator: >
                  let d = entity.attributes.value || entity.attributes.prices;
                  if (!Array.isArray(d) || !d.length) return [];
                  let min = Math.min(...d.map(e => (e.rce_pln !== undefined ? e.rce_pln : (e.cen_cost !== undefined ? e.cen_cost : (e.price || 0))) / 1000));
                  let tsStr = String(d[0].dtime).replace(/-/g, '/').replace('T', ' ');
                  return [[new Date(tsStr).getTime(), min]];
              - entity: sensor.alpha_pse_jutro_2
                name: Max Jutro
                unit: ' zł'
                float_precision: 2
                show:
                  in_chart: false
                  in_header: true
                data_generator: >
                  let d = entity.attributes.value || entity.attributes.prices;
                  if (!Array.isArray(d) || !d.length) return [];
                  let max = Math.max(...d.map(e => (e.rce_pln !== undefined ? e.rce_pln : (e.cen_cost !== undefined ? e.cen_cost : (e.price || 0))) / 1000));
                  let tsStr = String(d[0].dtime).replace(/-/g, '/').replace('T', ' ');
                  return [[new Date(tsStr).getTime(), max]];
              - entity: sensor.alpha_pse_dzisiaj_2
                name: Zarabiam / Plan
                type: column
                color: '#2ecc71'
                opacity: 0.4
                float_precision: 2
                show:
                  in_header: false
                data_generator: >
                  let d1 = entity.attributes.value || entity.attributes.prices;
                  d1 = Array.isArray(d1) ? d1 : [];
                  let state2 = hass.states['sensor.alpha_pse_jutro_2'];
                  let d2 = state2 && state2.attributes ? (state2.attributes.value || state2.attributes.prices) : [];
                  d2 = Array.isArray(d2) ? d2 : [];
                  let data = d1.concat(d2);
                  if (!data.length) return [];
                  let p = parseFloat(hass.states['input_number.alpha_rce_param_03'].state) || 0.7;
                  let res = data.map((entry) => {
                    let val = entry.rce_pln !== undefined ? entry.rce_pln : (entry.cen_cost !== undefined ? entry.cen_cost : (entry.price || 0));
                    let c = parseFloat(val) / 1000;
                    let tsStr = String(entry.dtime).replace(/-/g, '/').replace('T', ' ');
                    return [new Date(tsStr).getTime(), c >= p ? c : 0];
                  });
                  return res.sort((a, b) => a[0] - b[0]);
              - entity: sensor.alpha_pse_dzisiaj_2
                name: Ceny RCE (48h)
                type: line
                curve: stepline
                stroke_width: 2
                color: '#3498db'
                float_precision: 2
                show:
                  in_header: false
                data_generator: >
                  let d1 = entity.attributes.value || entity.attributes.prices;
                  d1 = Array.isArray(d1) ? d1 : [];
                  let state2 = hass.states['sensor.alpha_pse_jutro_2'];
                  let d2 = state2 && state2.attributes ? (state2.attributes.value || state2.attributes.prices) : [];
                  d2 = Array.isArray(d2) ? d2 : [];
                  let data = d1.concat(d2);
                  if (!data.length) return [];
                  let res = data.map((entry) => {
                    let val = entry.rce_pln !== undefined ? entry.rce_pln : (entry.cen_cost !== undefined ? entry.cen_cost : (entry.price || 0));
                    let c = parseFloat(val) / 1000;
                    let tsStr = String(entry.dtime).replace(/-/g, '/').replace('T', ' ');
                    return [new Date(tsStr).getTime(), c];
                  });
                  return res.sort((a, b) => a[0] - b[0]);
          - type: entities
            title: Monitor Systemu
            show_header_toggle: false
            entities:
              - entity: input_text.alpha_rce_stan_01
                name: DECYZJA MÓZGU
                icon: mdi:brain
                type: simple-entity
              - entity: input_text.alpha_rce_stan_03
                name: AKTUALNY STATUS
                icon: mdi:robot-outline
                type: simple-entity
              - type: divider
              - entity: input_text.alpha_rce_stan_15
                name: STATUS LICENCJI
                icon: mdi:shield-key
                type: simple-entity
              - entity: sensor.alpha_licencja_wygasa
                name: WAŻNA DO
                icon: mdi:calendar-clock
                type: simple-entity
              - type: divider
              - entity: sensor.alpha_hems_bateria_bms_soc
                name: Aktualny SOC Magazynu
                icon: mdi:battery-high
              - entity: input_number.alpha_rce_param_20
                name: Docelowy SOC (Płotek)
                icon: mdi:battery-clock
                type: simple-entity
          - type: entities
            title: Finanse i Zyski
            show_header_toggle: false
            entities:
              - entity: input_number.alpha_rce_param_02
                name: Koszt zakupu (+straty)
                icon: mdi:cash-minus
                type: simple-entity
              - entity: input_number.alpha_rce_param_03
                name: Próg sprzedaży (+marża)
                icon: mdi:target
                type: simple-entity
              - type: divider
              - entity: input_number.alpha_rce_param_05
                name: Szacowany Zysk (Dziś)
                icon: mdi:piggy-bank
                type: simple-entity
              - type: divider
              - entity: input_number.alpha_rce_param_44
                name: Zrealizowany (Miesiąc)
                icon: mdi:chart-bar
                type: simple-entity
              - entity: input_number.alpha_rce_param_45
                name: Zrealizowany (Rok)
                icon: mdi:chart-line
                type: simple-entity
              - entity: input_number.alpha_rce_param_43
                name: Całkowity Zwrot (Total)
                icon: mdi:cash-multiple
                type: simple-entity
  # =============================================================
  # ZAKŁADKA 3: 🏠 DOM (Centrum Dowodzenia i Szufladki)
  # =============================================================
  - type: panel
    path: dom
    title: DOM
    icon: mdi:home
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              ## 📊 ALPHA HEMS: Status & Cel

              **🧠 Decyzja Mózgu (Plan):** {{ states('input_text.alpha_rce_stan_01') }}
              
              **⚙️ Aktualny Status:** {{ states('input_text.alpha_rce_stan_03') }}

              ---
              **Cel ładowania (Płotek):** {{ states('input_number.alpha_rce_param_20') }} %

              **Bieżąca cena RCE:** {{ states('input_number.alpha_rce_param_01') }} zł/kWh

          - type: markdown
            title: 🧠 Rentgen Decyzji (Autoscale RCE & Logika 140%)
            content: >
              {% set sensor_rce = 'sensor.alpha_pse_dzisiaj_2' %}
              {% set cap_raw = states('number.alpha_hems_bateria_pojemnosc') | float(47.0) %}
              {% set cap = (cap_raw * 51.2 / 1000) | round(1) if cap_raw > 150 else cap_raw | round(1) %}
              {% set inv_w = states('sensor.alpha_hems_moc_znamionowa') | float(12000) %}
              {% set moc_kw = [states('number.alpha_hems_max_moc_sprzedazy') | float(6000), inv_w] | min / 1000 %}
              {% set poj = states('input_number.alpha_pojemnosc_magazynu') | float(cap) %}

              {# AUTODETEKCJA ENCJI LOW SOC Z FALOWNIKA ORAZ FLAGI ZIMY #}
              {% set low_soc_ent = (states.number | selectattr('entity_id', 'search', 'battery_low_soc$|shutdown_capacity$') | map(attribute='entity_id') | list | first) | default('number.alpha_hems_bateria_niski_soc') %}
              {% set live_low_soc = states(low_soc_ent) | float(20) %}
              {% set zimowy_beton = 10 if states('input_boolean.alpha_rce_flaga_12') == 'on' else 0 %}
              {% set hardware_low_soc = live_low_soc + zimowy_beton %}

              {# DYNAMICZNE MAPOWANIE SZUFLADEK WZGLEDEM DNIA TYGODNIA #}
              {% set d = now().weekday() %}
              {% set d_jutro = (now() + timedelta(days=1)).weekday() %}
              
              {% set map_n = {0: 11, 1: 12, 2: 13, 3: 14, 4: 15, 5: 16, 6: 17} %}
              {% set map_p = {0: 21, 1: 22, 2: 23, 3: 24, 4: 25, 5: 26, 6: 27} %}
              {% set map_w = {0: 31, 1: 32, 2: 33, 3: 34, 4: 35, 5: 36, 6: 37} %}
              
              {% set n_dzis = states('input_number.alpha_rce_param_' ~ map_n[d]) | float(0) %}
              {% set p_dzis = states('input_number.alpha_rce_param_' ~ map_p[d]) | float(0) %}
              {% set w_dzis = states('input_number.alpha_rce_param_' ~ map_w[d]) | float(0) %}
              
              {% set n_jutro = states('input_number.alpha_rce_param_' ~ map_n[d_jutro]) | float(0) %}
              {% set p_jutro = states('input_number.alpha_rce_param_' ~ map_p[d_jutro]) | float(0) %}
              {% set w_jutro = states('input_number.alpha_rce_param_' ~ map_w[d_jutro]) | float(0) %}

              {# POBRANIE POPRAWNEJ PROGNOZY PV W ZALEŻNOŚCI OD USTAWIENIA #}
              {% if states('input_boolean.alpha_rce_flaga_14') == 'on' %}
                {% set mnoznik = states('input_number.alpha_rce_param_46') | float(6.0) %}
                {% set zima = 0.6 if states('input_boolean.alpha_rce_flaga_12') == 'on' else 1.0 %}
                {% set raw_rad = state_attr('sensor.ai_raw_forecast_data', 'shortwave_radiation') | default([], true) %}
                {% set pv_jutro = ((raw_rad[24:48] | map('float') | sum * mnoznik * zima) / 1000) | round(2) if raw_rad | length >= 48 else 0.0 %}
              {% else %}
                {% set pv_jutro = states('sensor.solcast_pv_forecast_prognoza_na_jutro') | float(0) %}
              {% endif %}

              {% set status_plotek = states('input_number.alpha_rce_param_20') | float(0) %}

              {# LOGIKA SMART MORNING #}
              {% set total_jutro = n_jutro + p_jutro + w_jutro %}
              {% set wymog_140 = total_jutro * 1.4 %}
              {% set is_sunny = pv_jutro >= wymog_140 %}
              {% set mnoznik_p = 0.2 if is_sunny else 1.2 %}

              ### 📦 Fizyka Magazynu i Rejestry
              * Obecny SOC: **{{ states('sensor.alpha_hems_bateria_bms_soc') | float(0) }}%** | Cel (Płotek): **{{ status_plotek }}%**
              {% set wolny_soc = [states('sensor.alpha_hems_bateria_bms_soc') | float(0) - status_plotek, 0] | max %}
              {% set wolna_energia = (wolny_soc / 100) * poj %}
              * Energia do zrzutu: **{{ wolna_energia | round(2) }} kWh**
              
              {% set slupki_req = (wolna_energia / (moc_kw * 0.25)) | round(0, 'ceil') | int %}
              * Falownik ({{ moc_kw }} kW) wymaga **{{ slupki_req }}** słupków 15-min. do zrzutu.

              ---

              ### 🗄️ 1. STAN PAMIĘCI REJESTRÓW (Twarde Dane)
              * Zużycie Noc DZIŚ: **{{ n_dzis }} kWh** ➔ {{ ((n_dzis / poj) * 100) | round(2) }}% SOC
              * Zużycie Poranek DZIŚ: **{{ p_dzis }} kWh** ➔ {{ ((p_dzis / poj) * 100) | round(2) }}% SOC
              * Zużycie Wieczór DZIŚ: **{{ w_dzis }} kWh** ➔ {{ ((w_dzis / poj) * 100) | round(2) }}% SOC
              * Prognoza Słońca na Jutro: **{{ pv_jutro }} kWh** ➔ {{ ((pv_jutro / poj) * 100) | round(2) }}% SOC
              * Odczytana encja sprzętowa: `{{ low_soc_ent }}` ➔ **{{ live_low_soc }}% SOC** {% if zimowy_beton > 0 %}(+10% Beton Zimowy = {{ hardware_low_soc }}%){% endif %}

              ---

              {% set bufor_komfortu = states('input_number.alpha_rezerwa_soc') | float(0) %}
              {% set smart_toggle = states('input_boolean.alpha_rce_flaga_03') == 'on' %}
              {% set aktywny_bufor = 0 if (is_sunny and smart_toggle) else bufor_komfortu %}

              ### 🧮 2. MATRYCA OBLICZEŃ PŁOTKA (Baza maksymalna na start)
              {% if is_sunny %}
              > **☀️ SMART MORNING AKTYWNY (Prognoza > 140%):** Słońce jutro przejmuje obciążenie. Zapas poranny ścięty do 20% (tylko na rozruch do 7:00).
              {% else %}
              > **☁️ STANDARD (Prognoza < 140%):** Ładuję w nocy pełne zapotrzebowanie poranka + 20% bufora bezpieczeństwa.
              {% endif %}

              👉 **Maksymalna baza na start poranka (06:00):**
              {{ p_dzis }} kWh ({{ ((p_dzis / poj) * 100) | round(2) }}% SOC) × {{ mnoznik_p }} = **{{ (p_dzis * mnoznik_p) | round(2) }} kWh** ({{ (((p_dzis * mnoznik_p) / poj) * 100) | round(2) }}% SOC) 
              + Low SOC: {{ hardware_low_soc }}% + Bufor: {{ aktywny_bufor }}% + 1% ➔ **Startowy Max: {{ ((((p_dzis * mnoznik_p) / poj) * 100) + hardware_low_soc + aktywny_bufor + 1) | round(0) }}% SOC** *(Płotek maleje wraz z upływem czasu)*

              👉 **Maksymalna baza na start wieczoru:**
              {{ w_dzis }} kWh ({{ ((w_dzis / poj) * 100) | round(2) }}% SOC) × 1.2 = **{{ (w_dzis * 1.2) | round(2) }} kWh** ({{ (((w_dzis * 1.2) / poj) * 100) | round(2) }}% SOC) 
              + Low SOC: {{ hardware_low_soc }}% + Bufor: {{ aktywny_bufor }}% + 1% ➔ **Startowy Max: {{ ((((w_dzis * 1.2) / poj) * 100) + hardware_low_soc + aktywny_bufor + 1) | round(0) }}% SOC** *(Płotek maleje wraz z upływem czasu)*

              ---

              ### 🛡️ 3. LOGIKA 140% (Smart Morning & Zrzut Letni)
              * Łączne zapotrzebowanie JUTRA (Noc + Poranek + Wieczór): **{{ total_jutro | round(2) }} kWh**
              * Wymagany próg produkcji PV (Suma × 1.4): {{ total_jutro | round(2) }} kWh × 1.4 = **{{ wymog_140 | round(2) }} kWh**
              * Decyzja Mózgu: Czy Słońce Jutro ({{ pv_jutro }} kWh) ≥ Wymóg ({{ wymog_140 | round(2) }} kWh)?
              ➔ **{{ '✅ TAK (Agresywne cięcie poranka i odblokowany zrzut)' if is_sunny else '❌ NIE (Standardowa ochrona, zrzut zablokowany)' }}**

              ---

              ### 📈 Planowanie Okienek Handlowych (Autoscale RCE)
              {% set prices = state_attr(sensor_rce, 'value') %}
              {% if not prices %} {% set prices = state_attr(sensor_rce, 'prices') %} {% endif %}
              {% set now_ts = as_timestamp(now()) %}
              {% set h = now().hour %}
              {% set prognoza_shift = 15 if states('input_boolean.alpha_rce_flaga_12') == 'on' else 13 %}
              {% set t_aggr = 15 if states('input_boolean.alpha_rce_flaga_12') == 'on' else 13 %}
              {% set prog = states('input_number.alpha_rce_param_03') | float(0) * 1000 %}
              {% set ns = namespace(future_active=[], is_now=false) %}
              {% if slupki_req > 0 and prices is iterable and prices is not string and prices is not mapping %}
                {% for p in prices %}
                  {% set p_ts = as_timestamp(as_datetime(p.dtime | string)) if as_datetime(p.dtime | string) != none else as_timestamp(strptime(p.dtime | string, '%Y-%m-%d %H:%M:%S', strptime(p.dtime | string, '%Y-%m-%d %H:%M', none))) %}
                  {% if p_ts != none and p_ts >= (now_ts - 900) %}
                    {% if (h < t_aggr and p_ts < as_timestamp(today_at('%02d:01' % t_aggr))) or (h >= prognoza_shift) %}
                      {% set val = p.rce_pln | default(p.cen_cost | default(p.price | default(0))) | float(0) %}
                      {% if val >= prog %}
                        {% set ns.future_active = ns.future_active + [{'dtime': p.dtime | string, 'cena': val, 'ts': p_ts}] %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {% if ns.future_active | length > 0 %}
                  {% set top_slupki = ns.future_active | sort(attribute='cena', reverse=true) | batch(slupki_req) | first | default([]) %}
                  **🎯 Celownik Systemu (TOP {{ slupki_req }}):**
                  {% for b in top_slupki %}
                    - {{ b.dtime[11:16] }} -> **{{ b.cena }}** zł/MWh
                    {% if now_ts >= b.ts and now_ts < (b.ts + 900) %}
                      {% set ns.is_now = true %}
                    {% endif %}
                  {% endfor %}
                  **🛑 Werdykt Rentgena:** {{ '✅ Cel zablokowany: SPRZEDAŻ!' if ns.is_now else '⏳ Oczekuję na lepsze ceny.' }}
                {% else %}
                  **🛑 Werdykt Rentgena:** Brak opłacalnych okienek powyżej progu.
                {% endif %}
              {% else %}
                **🛑 Werdykt Rentgena:** Brak wolnej energii do zrzutu lub ujemne ceny.
              {% endif %}

          - type: markdown
            title: 🌙 Sektor Nocny (22:00-06:00)
            content: >
              - **Poniedziałek:** {{ states('input_number.alpha_rce_param_11') }} kWh
              - **Wtorek:** {{ states('input_number.alpha_rce_param_12') }} kWh
              - **Środa:** {{ states('input_number.alpha_rce_param_13') }} kWh
              - **Czwartek:** {{ states('input_number.alpha_rce_param_14') }} kWh
              - **Piątek:** {{ states('input_number.alpha_rce_param_15') }} kWh
              - **Sobota:** {{ states('input_number.alpha_rce_param_16') }} kWh
              - **Niedziela:** {{ states('input_number.alpha_rce_param_17') }} kWh

          - type: markdown
            title: 🌅 Sektor Poranny (06:00-13:00)
            content: >
              - **Poniedziałek:** {{ states('input_number.alpha_rce_param_21') }} kWh
              - **Wtorek:** {{ states('input_number.alpha_rce_param_22') }} kWh
              - **Środa:** {{ states('input_number.alpha_rce_param_23') }} kWh
              - **Czwartek:** {{ states('input_number.alpha_rce_param_24') }} kWh
              - **Piątek:** {{ states('input_number.alpha_rce_param_25') }} kWh
              - **Sobota:** {{ states('input_number.alpha_rce_param_26') }} kWh
              - **Niedziela:** {{ states('input_number.alpha_rce_param_27') }} kWh

          - type: markdown
            title: 🌆 Sektor Wieczorny (13:00-22:00)
            content: >
              - **Poniedziałek:** {{ states('input_number.alpha_rce_param_31') }} kWh
              - **Wtorek:** {{ states('input_number.alpha_rce_param_32') }} kWh
              - **Środa:** {{ states('input_number.alpha_rce_param_33') }} kWh
              - **Czwartek:** {{ states('input_number.alpha_rce_param_34') }} kWh
              - **Piątek:** {{ states('input_number.alpha_rce_param_35') }} kWh
              - **Sobota:** {{ states('input_number.alpha_rce_param_36') }} kWh
              - **Niedziela:** {{ states('input_number.alpha_rce_param_37') }} kWh

          - type: entities
            title: ⚡ Monitoring Napięcia Fazy
            show_header_toggle: false
            entities:
