# =============================================================
# ALPHA HEMS: CENTRALNY INTERFEJS UŻYTKOWNIKA (v1.11)
# STATUS: PRODUKCYJNY / EKSPORTOWY (Zatwierdzony Układ Własny)
#
# HISTORIA WERSJI:
# - v1.11: Wdrożenie uniwersalnego Pomocnika 'Pozostało PV' (sensor.pozostalo_pv) dla precyzyjnego odliczania prognozy Solcast.
# - v1.10: Wdrożenie analityki prognoz Solcast na główną kartę Sunsynk (zmienne energy_prognoza_106 oraz remaining_solar).
# - v1.09: Naprawa błędu znikającego generatora (mppts: 3). Standaryzacja produkcji dziennej 
#          (daily_pv_production) oraz przypisanie 3 źródeł: pv1_power, pv2_power i generator (jako pv3_power).
# - v1.07: Wdrożenie informacji o wygasaniu licencji (SaaS) na dashboard.
# - v1.06: Wdrożenie wizytówki STATUS LICENCJI (input_text.alpha_rce_stan_15) w panelu Monitor Systemu.
# - v1.02: Usunięcie encji prywatnych (Tuya, Solar Assistant, itp.).
# - v1.03: Usunięcie sekcji Diagnostyka Baterii.
# - v1.04: Wyłączenie agresywnego upychania (dense_section_placement: false).
# - v1.05: Przebudowa interfejsu (wizualna edycja użytkownika), usunięcie dolnych zegarów, naprawa formatowania tekstu Markdown w zakładce DOM.
# =============================================================

title: ALPHA HEMS
icon: mdi:solar-power
views:
  # =============================================================
  # ZAKŁADKA 1: ⚡ DEYE (Infrastruktura i Energia)
  # =============================================================
