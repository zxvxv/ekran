              auto_scale: true
              show_absolute: true
              colour: '#c01b1b'
              charge_colour: '#435bd0'
              dynamic_colour: true
              linear_gradient: true
              show_remaining_energy: true
              energy: 47616
              shutdown_soc: 6
            battery2:
