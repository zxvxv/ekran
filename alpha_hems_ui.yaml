              auto_scale: true
              colour: '#c9cc05'
              pv1_max_power: 7400
              display_mode: 2
            load:
              show_daily: true
              dynamic_icon: true
              dynamic_colour: true
              colour: '#2cce6a'
              show_absolute_aux: true
              auto_scale: true
