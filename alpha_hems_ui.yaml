          - show_name: true
            show_icon: true
            type: button
            entity: switch.deye_inverter_time_of_use
            show_state: true
          - show_name: true
            show_icon: true
            type: button
            entity: switch.deye_inverter_force_off_grid
          - show_name: true
            show_icon: true
            type: button
            entity: button.deye_inverter_sync_inverter_time
          - show_name: true
            show_icon: true
            type: button
            entity: input_boolean.alpha_rce_flaga_11
            name: Zastrzyk Danych
            icon: mdi:database-refresh
      - type: grid
        cards:
          - type: tile
            entity: sensor.deye_inverter_device_date_time
