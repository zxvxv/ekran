            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_2_grid_charge
            name: Grid 2
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_2_gen
            name: Gen 2
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_3_grid_charge
            name: Grid 3
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_3_gen
            name: Gen 3
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_4_grid_charge
            name: Grid 4
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_4_gen
            name: Gen 4
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_5_grid_charge
            name: Grid 5
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_5_gen
            name: Gen 5
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_6_grid_charge
            name: Grid 6
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.deye_inverter_time_of_use_6_gen
            name: Gen 6
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: entities
            entities:
              - entity: number.deye_inverter_maximum_battery_grid_charge_current
                name: Ład. Sieć
              - entity: number.deye_inverter_battery_generator_charging_current
                name: Ład Gen.
              - entity: number.deye_inverter_maximum_battery_charge_current
                name: Max. Ład.

  # =============================================================
  # ZAKŁADKA 2: 📈 GIEŁDA (RCE IntegraSoft)
  # =============================================================
  - type: sidebar
    path: rce_integra
    title: RCE_IntegraSoft
    icon: mdi:chart-line
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:apexcharts-card
            graph_span: 24h
            update_interval: 1min
            header:
              show: true
              title: 'Alpha: Monitor Sprzedaży'
              show_states: true
              colorize_states: true
            span:
              start: day
            now:
              show: true
              label: TERAZ
              color: '#e74c3c'
            series:
              - entity: sensor.deye_inverter_grid_power
                name: Moc Sieci
                unit: ' W'
                color: '#9b59b6'
                show:
                  in_chart: false
                  in_header: true
              - entity: input_number.alpha_rce_param_01
                name: Cena Teraz
                unit: ' zł'
                float_precision: 2
                show:
                  in_chart: false
                  in_header: true
              - entity: input_number.alpha_rce_param_03
                name: Mój Próg
                unit: ' zł'
                color: '#e67e22'
                float_precision: 2
                show:
                  in_chart: false
                  in_header: true
              - entity: sensor.alpha_pse_dzisiaj_2
                name: Zarabiam
                type: column
                color: '#2ecc71'
                opacity: 0.4
                float_precision: 2
                show:
                  in_header: false
                data_generator: >
                  const data = entity.attributes.value || entity.attributes.prices;
                  if (!data) return [];  const p = parseFloat(hass.states['input_number.alpha_rce_param_03'].state) || 0.7; return data.map((entry) => {
                    const val = entry.rce_pln !== undefined ? entry.rce_pln : (entry.cen_cost !== undefined ? entry.cen_cost : (entry.price || 0));
                    const c = parseFloat(val) / 1000;
                    const tsStr = String(entry.dtime).replace(' ', 'T');
                    return [new Date(tsStr).getTime(), c >= p ? c : 0];
                  });
              - entity: sensor.alpha_pse_dzisiaj_2
                name: Ceny na dziś
                type: line
                curve: stepline
                stroke_width: 2
                color: '#3498db'
                float_precision: 2
                show:
                  in_header: false
                data_generator: >
                  const data = entity.attributes.value || entity.attributes.prices;
                  if (!data) return []; return data.map((entry) => {
                    const val = entry.rce_pln !== undefined ? entry.rce_pln : (entry.cen_cost !== undefined ? entry.cen_cost : (entry.price || 0));
                    const c = parseFloat(val) / 1000;
                    const tsStr = String(entry.dtime).replace(' ', 'T');
                    return [new Date(tsStr).getTime(), c];
                  });
          - type: entities
            title: Monitor Systemu
            show_header_toggle: false
            entities:
              - entity: input_text.alpha_rce_stan_01
                name: DECYZJA MÓZGU
                icon: mdi:brain
                type: simple-entity
              - entity: input_text.alpha_rce_stan_03
                name: AKTUALNY STATUS
                icon: mdi:robot-outline
                type: simple-entity
              - type: divider
              - entity: input_text.alpha_rce_stan_15
                name: STATUS LICENCJI
                icon: mdi:shield-key
                type: simple-entity
              - entity: sensor.alpha_licencja_wygasa
                name: WAŻNA DO
                icon: mdi:calendar-clock
                type: simple-entity
              - type: divider
              - entity: input_number.alpha_rce_param_02
                name: Koszt zakupu (+straty)
                icon: mdi:cash-minus
                type: simple-entity
              - entity: input_number.alpha_rce_param_03
                name: Próg sprzedaży (+marża)
                icon: mdi:target
                type: simple-entity
              - type: divider
              - entity: sensor.deye_inverter_battery_bms_soc
                name: Aktualny SOC Magazynu
                icon: mdi:battery-high
              - entity: input_number.alpha_rce_param_20
                name: Docelowy SOC (Płotek)
                icon: mdi:battery-clock
                type: simple-entity
              - entity: input_number.alpha_rce_param_04
                name: Energia do Sprzedaży
                icon: mdi:battery-arrow-up
                type: simple-entity
              - entity: input_number.alpha_rce_param_05
                name: Szacowany Zysk (Dziś)
                icon: mdi:piggy-bank
                type: simple-entity
      - type: custom:apexcharts-card
        graph_span: 24h
        update_interval: 1min
        header:
          show: true
          title: 'Alpha: Plan Sprzedaży - JUTRO'
          show_states: true
          colorize_states: true
        span:
          start: day
          offset: +1d
        series:
          - entity: sensor.alpha_pse_jutro_2
            name: Min
            unit: ' zł'
            float_precision: 2
            show:
              in_chart: false
              in_header: true
            data_generator: >
              const d = entity.attributes.value; if (!d) return []; const min = Math.min(...d.map(e => e.rce_pln / 1000)); return [[new Date(d[0].dtime.replace(/-/g, '/')).getTime(), min]];
          - entity: sensor.alpha_pse_jutro_2
            name: Max
            unit: ' zł'
            float_precision: 2
            show:
              in_chart: false
              in_header: true
            data_generator: >
              const d = entity.attributes.value; if (!d) return []; const max = Math.max(...d.map(e => e.rce_pln / 1000)); return [[new Date(d[0].dtime.replace(/-/g, '/')).getTime(), max]];
          - entity: sensor.alpha_pse_jutro_2
            name: Zysk (Plan)
            type: column
            color: '#2ecc71'
            opacity: 0.4
            show:
              in_header: false
            data_generator: >
              const data = entity.attributes.value; if (!data) return []; const p = parseFloat(hass.states['input_number.alpha_rce_param_03'].state) || 0.7; return data.map((entry) => {
                const c = entry.rce_pln / 1000;
                return [new Date(entry.dtime.replace(/-/g, '/')).getTime(), c >= p ? c : 0];
              });
          - entity: sensor.alpha_pse_jutro_2
            name: Giełda Jutro
            type: line
            curve: stepline
            color: '#3498db'
            show:
              in_header: false
            data_generator: >
              const data = entity.attributes.value; if (!data) return []; return data.map((entry) => {
                return [new Date(entry.dtime.replace(/-/g, '/')).getTime(), entry.rce_pln / 1000];
              });

  # =============================================================
  # ZAKŁADKA 3: 🏠 DOM (Centrum Dowodzenia i Szufladki)
  # =============================================================
  - type: panel
    path: dom
    title: DOM
    icon: mdi:home
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              ## 📊 ALPHA HEMS: Status & Cel

              **Stan Systemu:** {{ states('input_text.alpha_rce_stan_03') }}

              **Cel ładowania (Płotek):** {{ states('input_number.alpha_rce_param_20') }} %

              **Bieżąca cena RCE:** {{ states('input_number.alpha_rce_param_01') }} zł/kWh

          - type: markdown
            title: 🌙 Sektor Nocny (22:00-06:00)
