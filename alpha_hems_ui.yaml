# =============================================================
# ALPHA HEMS: CENTRALNY INTERFEJS UŻYTKOWNIKA (v1.16)
# STATUS: PRODUKCYJNY / EKSPORTOWY (Zatwierdzony Układ Własny)
#
# HISTORIA WERSJI:
# - v1.16: Dodano nową zakładkę "PRZEPŁYW" (Pełnoekranowa karta Sunsynk). 
#          Dodano licznik "Balansowanie (dni)" (Gauge) w sekcji sterowania.
# - v1.15: Zmiana formatowania szufladek finansowych (43, 44, 45) na type: simple-entity.
# =============================================================

title: ALPHA HEMS
icon: mdi:solar-power
views:
  # =============================================================
  # ZAKŁADKA 1: ⚡ DEYE (Infrastruktura i Energia)
  # =============================================================
  - type: sections
    max_columns: 5
    title: DEYE
    path: deye-nev
    dense_section_placement: false
    top_margin: true
    sections:
      - type: grid
        column_span: 2
        cards:
          - type: custom:sunsynk-power-flow-card
            cardstyle: lite
            wide: false
            large_font: true
            show_solar: true
            show_battery: true
            show_grid: true
            center_no_grid: true
            card_height: '750'
            card_width: 100%
            decimal_places: 2
            decimal_places_energy: 1
            dynamic_line_width: true
            max_line_width: 4
            min_line_width: 1
            inverter:
              three_phase: true
              auto_scale: true
              modern: true
              colour: '#217cb5'
              autarky: power
            battery:
              show_daily: true
              auto_scale: true
              show_absolute: true
              colour: '#c01b1b'
              charge_colour: '#435bd0'
              dynamic_colour: true
              linear_gradient: true
              show_remaining_energy: true
              energy: 47616
              shutdown_soc: 6
            battery2:
              energy: 0
              shutdown_soc: 20
              soc_end_of_charge: 100
              invert_power: false
              hide_soc: false
              colour: '#ffc0cb'
              show_remaining_energy: true
              remaining_energy_to_shutdown: false
              show_absolute: false
              auto_scale: true
              dynamic_colour: true
              linear_gradient: true
              animate: true
              path_threshold: 100
              navigate: ''
              invert_flow: false
            solar:
              show_daily: true
              mppts: 3
              pv1_name: S_Edge
              auto_scale: true
              colour: '#c9cc05'
              pv1_max_power: 7400
              display_mode: 2
            load:
              show_daily: true
              dynamic_icon: true
              dynamic_colour: true
              colour: '#2cce6a'
              show_absolute_aux: true
              auto_scale: true
              additional_loads: 1
              load1_name: Gwarantowane
              load1_icon: mdi:calendar-text
              load2_name: Pozostało PV
              load2_icon: mdi:solar-power-variant
              essential_name: UPS
            grid:
              show_daily_buy: true
              show_daily_sell: true
              show_nonessential: true
              auto_scale: true
              colour: '#2a95cb'
              export_colour: '#e0c124'
            grid_options:
              columns: full
              rows: 1
            entities:
              remaining_solar: sensor.solcast_pv_forecast_pozostala_prognoza_na_dzis
              energy_prognoza_106: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
              day_pv_energy_108: sensor.deye_inverter_daily_pv_production
              essential_load1: sensor.deye_inverter_load_ups_power
              essential_load1_extra: sensor.dobowe_zuzycie_ups
              essential_load2: sensor.smart_plug_2_moc
              essential_load3: sensor.smart_plug_3_moc
              use_timer_248: switch.sunsynk_toggle_system_timer
              priority_load_243: sensor.deye_inverter_load_power
              inverter_voltage_154: sensor.deye_inverter_output_l1_voltage
              load_frequency_192: sensor.deye_inverter_load_frequency
              inverter_current_164: sensor.deye_inverter_output_l1_current
              inverter_power_175: sensor.sunsynk_inverter_power
              grid_connected_status_194: binary_sensor.sunsynk_grid_connected_status
              inverter_status_59: sensor.sunsynk_overall_state
              day_battery_discharge_71: sensor.deye_inverter_daily_battery_discharge
              battery_voltage_183: sensor.deye_inverter_battery_bms_voltage
              battery_power_190: sensor.deye_inverter_battery_power
              battery_current_191: sensor.deye_inverter_battery_bms_current
              grid_power_169: sensor.sunsynk_grid_power
              day_grid_export_77: sensor.deye_inverter_daily_energy_sold
              grid_ct_power_172: sensor.deye_inverter_grid_l1_power
              day_load_energy_84: sensor.deye_inverter_daily_load_consumption
              pv1_power_186: sensor.deye_inverter_pv1_power
              pv2_power_187: sensor.deye_inverter_pv2_power
              pv3_power_188: sensor.deye_inverter_generator_power_total
              day_grid_import_76: sensor.deye_inverter_daily_energy_bought
              grid_ct_power_total: sensor.deye_inverter_external_ct_power
              battery_temp_182: sensor.deye_inverter_battery_temperature
              day_aux_energy: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
              essential_power: sensor.deye_inverter_load_power
              radiator_temp_91: sensor.deye_inverter_ac_temperature
              dc_transformer_temp_90: sensor.magazyn_pomieszczenie_temperatura
              solar_sell_247: switch.deye_inverter_solar_sell
              day_battery_charge_70: sensor.deye_inverter_daily_battery_charge
              battery_soc_184: sensor.deye_inverter_battery
              battery_rated_capacity: number.deye_inverter_battery_capacity
              battery_shutdown_soc: number.deye_inverter_battery_shutdown_soc_low_dc

      - type: grid
        cards:
          - type: entities
            entities:
              - entity: number.deye_inverter_time_of_use_1_soc
                name: 0:00 - 4:00
              - entity: number.deye_inverter_time_of_use_2_soc
                name: 4:00 - 5:55
              - entity: number.deye_inverter_time_of_use_3_soc
                name: 5:55 - 13:05
              - entity: number.deye_inverter_time_of_use_4_soc
                name: 13:05 - 14:55
              - entity: number.deye_inverter_time_of_use_5_soc
                name: 14:55 - 22:05
              - entity: number.deye_inverter_time_of_use_6_soc
                name: 22:05 - 0:00
            title: Time of Use
          - type: button
            entity: switch.deye_inverter_time_of_use
            show_state: true
          - type: button
            entity: switch.deye_inverter_force_off_grid
          - type: button
            entity: button.deye_inverter_sync_inverter_time

      - type: grid
        cards:
          - type: tile
            entity: sensor.deye_inverter_device_date_time
            name: Czas Deye
          - type: tile
            entity: switch.deye_inverter_time_of_use_1_grid_charge
            name: Grid 1
          - type: tile
            entity: switch.deye_inverter_time_of_use_1_gen
            name: Gen 1
          - type: tile
            entity: switch.deye_inverter_time_of_use_2_grid_charge
            name: Grid 2
          - type: tile
            entity: switch.deye_inverter_time_of_use_2_gen
            name: Gen 2
          - type: tile
            entity: switch.deye_inverter_time_of_use_3_grid_charge
            name: Grid 3
          - type: tile
            entity: switch.deye_inverter_time_of_use_3_gen
            name: Gen 3
          - type: tile
            entity: switch.deye_inverter_time_of_use_4_grid_charge
            name: Grid 4
          - type: tile
            entity: switch.deye_inverter_time_of_use_4_gen
            name: Gen 4
          - type: tile
            entity: switch.deye_inverter_time_of_use_5_grid_charge
            name: Grid 5
          - type: tile
            entity: switch.deye_inverter_time_of_use_5_gen
            name: Gen 5
          - type: tile
            entity: switch.deye_inverter_time_of_use_6_grid_charge
            name: Grid 6
          - type: tile
            entity: switch.deye_inverter_time_of_use_6_gen
            name: Gen 6
          # --- LICZNIK BALANSOWANIA ---
          - type: gauge
            entity: input_number.alpha_rce_param_42
            name: Balansowanie (dni)
            grid_options:
              columns: 12
            needle: true
            severity:
              green: 0
              yellow: 8
              red: 14
            max: 21

  # =============================================================
  # ZAKŁADKA 2: 📈 GIEŁDA (RCE IntegraSoft)
  # =============================================================
  - type: sidebar
    path: rce_integra
    title: GIEŁDA
    icon: mdi:chart-line
    cards:
      - type: custom:apexcharts-card
        graph_span: 24h
        header:
          show: true
          title: 'Alpha: Monitor Sprzedaży'
          show_states: true
        series:
          - entity: input_number.alpha_rce_param_01
            name: Cena Teraz
            float_precision: 2
          - entity: sensor.alpha_pse_dzisiaj_2
            name: Ceny na dziś
            type: line
            curve: stepline
            data_generator: >
              const data = entity.attributes.value || entity.attributes.prices;
              if (!data) return []; return data.map((entry) => {
                const val = entry.rce_pln !== undefined ? entry.rce_pln : entry.price;
                return [new Date(entry.dtime.replace(' ', 'T')).getTime(), parseFloat(val) / 1000];
              });

  # =============================================================
  # ZAKŁADKA 3: 🏠 DOM (Centrum Dowodzenia)
  # =============================================================
  - type: panel
    path: dom
    title: DOM
    icon: mdi:home
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              ## 📊 ALPHA HEMS: Status
              **Stan:** {{ states('input_text.alpha_rce_stan_03') }}
          - type: entities
            entities:
              - entity: sensor.deye_inverter_grid_l1_voltage
              - entity: sensor.deye_inverter_grid_l2_voltage
              - entity: sensor.deye_inverter_grid_l3_voltage

  # =============================================================
  # ZAKŁADKA 4: 🔄 PRZEPŁYW (Poprawiony Pełny Ekran)
  # =============================================================
  - type: panel
    path: flow-view
    title: PRZEPŁYW
    icon: mdi:sync
    cards:
      - type: custom:sunsynk-power-flow-card
        cardstyle: lite
        wide: true
        large_font: true
        show_solar: true
        show_battery: true
        show_grid: true
        center_no_grid: true
        card_height: '850'
        card_width: 100%
        decimal_places: 2
        inverter:
          three_phase: true
          auto_scale: true
          modern: true
          colour: '#217cb5'
        battery:
          show_daily: true
          auto_scale: true
          show_absolute: true
          colour: '#c01b1b'
          energy: 47616
          shutdown_soc: 6
        solar:
          show_daily: true
          mppts: 3
          auto_scale: true
          colour: '#c9cc05'
        load:
          show_daily: true
          colour: '#2cce6a'
          additional_loads: 1
        grid:
          show_daily_buy: true
          show_daily_sell: true
          auto_scale: true
          colour: '#2a95cb'
        entities:
          remaining_solar: sensor.solcast_pv_forecast_pozostala_prognoza_na_dzis
          energy_prognoza_106: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
          day_pv_energy_108: sensor.deye_inverter_daily_pv_production
          essential_load1: sensor.deye_inverter_load_ups_power
          use_timer_248: switch.sunsynk_toggle_system_timer
          priority_load_243: sensor.deye_inverter_load_power
          inverter_voltage_154: sensor.deye_inverter_output_l1_voltage
          battery_voltage_183: sensor.deye_inverter_battery_bms_voltage
          battery_power_190: sensor.deye_inverter_battery_power
          battery_current_191: sensor.deye_inverter_battery_bms_current
          grid_power_169: sensor.sunsynk_grid_power
          day_grid_export_77: sensor.deye_inverter_daily_energy_sold
          day_load_energy_84: sensor.deye_inverter_daily_load_consumption
          pv1_power_186: sensor.deye_inverter_pv1_power
          pv2_power_187: sensor.deye_inverter_pv2_power
          pv3_power_188: sensor.deye_inverter_generator_power_total
          day_grid_import_76: sensor.deye_inverter_daily_energy_bought
          battery_soc_184: sensor.deye_inverter_battery
