# =============================================================
# ALPHA HEMS: CENTRALNY INTERFEJS UŻYTKOWNIKA (v1.31)
# STATUS: PRODUKCYJNY / EKSPORTOWY (Zatwierdzony Układ Własny)
#
# HISTORIA WERSJI:
# - v1.31: (STABILITY FIX) Usunięcie zaawansowanego HTML na rzecz 
#          bezpiecznego Markdown. Naprawa wyświetlania Raportu Księgowego.
#          Poprawa logiki statusu Bypass vs Oczekiwanie.
# - v1.30: (UX REVOLUTION) Próba wdrożenia blokowego Raportu.
# - v1.29: (SURVIVAL CALCULATOR) Usunięcie zbędnych kart TOU i Grid/Gen.
# =============================================================

title: ALPHA HEMS
icon: mdi:solar-power
views:
  # =============================================================
  # ZAKŁADKA 1: ⚡ DEYE (Infrastruktura i Energia)
  # =============================================================
  - type: sections
    max_columns: 5
    title: DEYE
    path: deye-nev
    dense_section_placement: false
    top_margin: true
    header:
      layout: responsive
      badges_position: bottom
      badges_wrap: scroll
    sections:
      - type: grid
        column_span: 2
        cards:
          - cardstyle: lite
            wide: false
            large_font: true
            show_solar: true
            show_battery: true
            show_grid: true
            center_no_grid: true
            card_height: '750'
            card_width: 100%
            decimal_places: 2
            decimal_places_energy: 1
            dynamic_line_width: true
            max_line_width: 4
            min_line_width: 1
            inverter:
              three_phase: true
              auto_scale: true
              modern: true
              colour: '#217cb5'
              autarky: power
            battery:
              show_daily: true
              auto_scale: true
              show_absolute: true
              colour: '#c01b1b'
              charge_colour: '#435bd0'
              dynamic_colour: true
              linear_gradient: true
              show_remaining_energy: true
              energy: 47616
              shutdown_soc: 6
            battery2:
              energy: 0
              shutdown_soc: 20
              soc_end_of_charge: 100
              invert_power: false
              hide_soc: false
              colour: '#ffc0cb'
              show_remaining_energy: true
              remaining_energy_to_shutdown: false
              show_absolute: false
              auto_scale: true
              dynamic_colour: true
              linear_gradient: true
              animate: true
              path_threshold: 100
              navigate: ''
              invert_flow: false
            solar:
              show_daily: true
              mppts: 3
              pv1_name: S_Edge
              auto_scale: true
              colour: '#c9cc05'
              pv1_max_power: 7400
              display_mode: 2
            load:
              show_daily: true
              dynamic_icon: true
              dynamic_colour: true
              colour: '#2cce6a'
              show_absolute_aux: true
              auto_scale: true
              additional_loads: 1
              load1_name: Gwarantowane
              load1_icon: mdi:calendar-text
              load2_name: Pozostało PV
              load2_icon: mdi:solar-power-variant
              essential_name: UPS
            grid:
              show_daily_buy: true
              show_daily_sell: true
              show_nonessential: true
              auto_scale: true
              colour: '#2a95cb'
              export_colour: '#e0c124'
            type: custom:sunsynk-power-flow-card
            grid_options:
              columns: full
              rows: 1
            entities:
              remaining_solar: sensor.solcast_pv_forecast_pozostala_prognoza_na_dzis
              energy_prognoza_106: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
              day_pv_energy_108: sensor.deye_inverter_daily_pv_production
              essential_load1: sensor.deye_inverter_load_ups_power
              essential_load1_extra: sensor.dobowe_zuzycie_ups
              essential_load2: sensor.smart_plug_2_moc
              essential_load3: sensor.smart_plug_3_moc
              use_timer_248: switch.sunsynk_toggle_system_timer
              priority_load_243: sensor.deye_inverter_load_power
              inverter_voltage_154: sensor.deye_inverter_output_l1_voltage
              load_frequency_192: sensor.deye_inverter_load_frequency
              inverter_current_164: sensor.deye_inverter_output_l1_current
              inverter_power_175: sensor.sunsynk_inverter_power
              grid_connected_status_194: binary_sensor.sunsynk_grid_connected_status
              inverter_status_59: sensor.sunsynk_overall_state
              day_battery_discharge_71: sensor.deye_inverter_daily_battery_discharge
              battery_voltage_183: sensor.deye_inverter_battery_bms_voltage
              battery_power_190: sensor.deye_inverter_battery_power
              battery_current_191: sensor.deye_inverter_battery_bms_current
              grid_power_169: sensor.sunsynk_grid_power
              day_grid_export_77: sensor.deye_inverter_daily_energy_sold
              grid_ct_power_172: sensor.deye_inverter_grid_l1_power
              day_load_energy_84: sensor.deye_inverter_daily_load_consumption
              pv1_power_186: sensor.deye_inverter_pv1_power
              pv2_power_187: sensor.deye_inverter_pv2_power
              pv3_power_188: sensor.deye_inverter_generator_power_total
              day_grid_import_76: sensor.deye_inverter_daily_energy_bought
              grid_ct_power_total: sensor.deye_inverter_grid_power
              battery_temp_182: sensor.deye_inverter_battery_temperature
              day_aux_energy: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
              essential_power: sensor.deye_inverter_load_power
              radiator_temp_91: sensor.deye_inverter_ac_temperature
              dc_transformer_temp_90: sensor.magazyn_pomieszczenie_temperatura
              solar_sell_247: switch.deye_inverter_solar_sell
              day_battery_charge_70: sensor.deye_inverter_daily_battery_charge
              battery_soc_184: sensor.deye_inverter_battery
              battery_rated_capacity: number.deye_inverter_battery_capacity
              battery_shutdown_soc: number.deye_inverter_battery_shutdown_soc_low_dc
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              # MODUŁ: RAPORT KSIĘGOWEGO ALPHA v1.31
              - type: markdown
                title: 🛡️ Raport Księgowego ALPHA
                content: >
                  {% set cap_raw = states('number.deye_inverter_battery_capacity') | float(47.0) %}
                  {% set cap = (cap_raw * 51.2 / 1000) | round(1) if cap_raw > 150 else cap_raw | round(1) %}
                  {% set soc = states('sensor.deye_inverter_battery_bms_soc') | float(0) %}
                  {% set plotek = states('input_number.alpha_rce_param_20') | float(20) %}
                  {% set wolny_soc = [soc - plotek, 0] | max %}
                  {% set amunicja = (wolny_soc / 100) * cap %}
                  {% set tou_state = states('switch.deye_inverter_time_of_use') %}
                  {% set is_dst = now().month >= 4 and now().month <= 9 %}
                  {% set dzienne_od = '15:05' if is_dst else '13:05' %}
                  {% set dzienne_do = '16:55' if is_dst else '14:55' %}

                  ### ⚙️ Status Operacyjny
                  {% if tou_state == 'off' %}
                  **🔴 BYPASS AKTYWNY** (Awaryjne ssanie z sieci)
                  {% else %}
                  **🟢 PRACA NORMALNA** (Sterowanie automatyczne)
                  {% endif %}
                  
                  * ☀️ Okno Dzień: **{{ dzienne_od }} — {{ dzienne_do }}**
                  * 🌙 Okno Noc: **22:05 — 06:00**

                  ---

                  ### 🔋 Bilans Przetrwania
                  * 🎯 CEL (Płotek): **{{ plotek | int }}%**
                  * 📦 MAGAZYN: **{{ soc | int }}%**

                  {% if soc >= plotek %}
                  > ✅ **Dom zabezpieczony:** Mamy wystarczający zapas energii na bieżący sektor.
                  {% elif tou_state == 'off' %}
                  > 🚨 **Ładowanie awaryjne:** Bypass aktywny. System uzupełnia braki z sieci do poziomu Płotka!
                  {% else %}
                  > ⏳ **Oczekiwanie:** Zapas poniżej Płotka, ale energia z sieci jest droga. Oczekuję na darmowe słońce lub okienko G12.
                  {% endif %}

                  ---

                  ### 📈 Amunicja Maklera RCE
                  💰 Wolna energia do handlu: **{{ amunicja | round(1) }} kWh**
                  
                  <details>
                    <summary><i>Pokaż założenia logiki...</i></summary>
                    <i>System automatycznie dolicza +20% fizycznej rezerwy (kWh) na nagłe obciążenia (np. włączenie piekarnika). Widoczna powyżej energia to bezpieczna nadwyżka, którą Makler może bezpiecznie zrzucić na giełdę bez narażania Cię na nocny brak prądu.</i>
                  </details>

          - show_name: true
            show_icon: true
            type: button
            entity: switch.deye_inverter_time_of_use
            name: Główny Bypass (TOU)
            show_state: true
          - show_name: true
            show_icon: true
            type: button
            entity: switch.deye_inverter_force_off_grid
          - show_name: true
            show_icon: true
            type: button
            entity: button.deye_inverter_sync_inverter_time
          - show_name: true
            show_icon: true
            type: button
            entity: input_boolean.alpha_rce_flaga_11
            name: Zastrzyk Danych
            icon: mdi:database-refresh
      - type: grid
        cards:
          - type: tile
            entity: sensor.deye_inverter_device_date_time
            name: Czas Deye
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.deye_inverter_load_power
            name: Obciążenie Domu
            vertical: false
            features_position: bottom
          - type: tile
            entity: input_number.alpha_rce_param_42
            name: Dni od Balansowania
            icon: mdi:battery-sync
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: entities
            entities:
              - entity: number.deye_inverter_maximum_battery_grid_charge_current
                name: Ład. Sieć
              - entity: number.deye_inverter_battery_generator_charging_current
                name: Ład Gen.
              - entity: number.deye_inverter_maximum_battery_charge_current
                name: Max. Ład.
                
          # --- PRZEŁĄCZNIK ŹRÓDŁA POGODY ---
          - type: entities
            title: ⚙️ Konfiguracja Pogody ALPHA
            show_header_toggle: false
            entities:
              - entity: input_boolean.alpha_rce_flaga_14
                name: "Włącz: Alpha AI, Wyłącz: Solcast"
                icon: mdi:weather-cloudy-clock
                
          # --- KARTA 1: SOLCAST (7 dni) ---
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.alpha_rce_flaga_14
                state: 'off'
            card:
              type: entities
              title: ☀️ Prognoza Solcast (7 dni)
              show_header_toggle: false
              entities:
                - entity: sensor.solcast_pv_forecast_pozostala_prognoza_na_dzis
                  name: Pozostało na dziś
                  icon: mdi:solar-power
                - type: divider
                - entity: sensor.solcast_pv_forecast_prognoza_na_dzisiaj
                  name: Dziś (Całkowita)
                  icon: mdi:weather-sunny
                - entity: sensor.solcast_pv_forecast_prognoza_na_jutro
                  name: Jutro
                  icon: mdi:weather-partly-cloudy
                - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_3
                  name: Pojutrze
                  icon: mdi:calendar-clock
                - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_4
                  name: Za 3 dni
                  icon: mdi:calendar-clock
                - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_5
                  name: Za 4 dni
                  icon: mdi:calendar-clock
                - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_6
                  name: Za 5 dni
                  icon: mdi:calendar-clock
                - entity: sensor.solcast_pv_forecast_prognoza_na_dzien_7
                  name: Za 6 dni
                  icon: mdi:calendar-clock

          # --- KARTA 2: ALPHA AI (Open-Meteo) ---
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.alpha_rce_flaga_14
                state: 'on'
            card:
              type: markdown
              title: 🧠 Prognoza Alpha AI (Open-Meteo)
              content: >
                {% set mnoznik = states('input_number.alpha_rce_param_46') | float(6.0) %}
                {% set zima = 0.6 if states('input_boolean.alpha_rce_flaga_12') == 'on' else 1.0 %}
                {% set radar = 'sensor.ai_raw_forecast_data' %}
                {% for state in states.weather | selectattr('attributes.attribution', 'defined') %}
                  {% if 'Open-Meteo' in state.attributes.attribution %}
                    {% set radar = state.entity_id %}
                  {% endif %}
                {% endfor %}
                {% set raw_rad = state_attr(radar, 'forecast') | default([], true) | map(attribute='shortwave_radiation') | select('defined') | list if radar.startswith('weather.') else state_attr('sensor.ai_raw_forecast_data', 'shortwave_radiation') | default([], true) %}
                
                **Zastosowany mnożnik dachu:** {{ (mnoznik * zima) | round(2) }}
                
                | Dzień | Prognoza (kWh) |
                | :--- | ---: |
                | ☀️ **Dziś** | **{{ ((raw_rad[0:24] | map('float') | sum * mnoznik * zima) / 1000) | round(1) if raw_rad | length >= 24 else 0.0 }}** |
                | ⛅ **Jutro** | **{{ ((raw_rad[24:48] | map('float') | sum * mnoznik * zima) / 1000) | round(1) if raw_rad | length >= 48 else 0.0 }}** |
                | 📅 **Pojutrze** | **{{ ((raw_rad[48:72] | map('float') | sum * mnoznik * zima) / 1000) | round(1) if raw_rad | length >= 72 else 0.0 }}** |
                | 📅 **Za 3 dni** | **{{ ((raw_rad[72:96] | map('float') | sum * mnoznik * zima) / 1000) | round(1) if raw_rad | length >= 96 else 0.0 }}** |
                | 📅 **Za 4 dni** | **{{ ((raw_rad[96:120] | map('float') | sum * mnoznik * zima) / 1000) | round(1) if raw_rad | length >= 120 else 0.0 }}** |
                | 📅 **Za 5 dni** | **{{ ((raw_rad[120:144] | map('float') | sum * mnoznik * zima) / 1000) | round(1) if raw_rad | length >= 144 else 0.0 }}** |
                | 📅 **Za 6 dni** | **{{ ((raw_rad[144:168] | map('float') | sum * mnoznik * zima) / 1000) | round(1) if raw_rad | length >= 168 else 0.0 }}** |

  # =============================================================
  # ZAKŁADKA 2: 📈 GIEŁDA (RCE IntegraSoft)
  # =============================================================
  - type: panel
    path: rce_integra
    title: RCE_IntegraSoft
    icon: mdi:chart-line
    cards:
      - type: vertical-stack
        cards:
          - type: custom:apexcharts-card
            graph_span: 24h
            update_interval: 1min
            header:
              show: true
              title: 'Alpha: Monitor Sprzedaży'
              show_states: true
              colorize_states: true
            series:
              - entity: sensor.deye_inverter_grid_power
                name: Moc Sieci
                unit: ' W'
                show:
                  in_chart: false
                  in_header: true
              - entity: input_number.alpha_rce_param_01
                name: Cena Teraz
                unit: ' zł'
                show:
                  in_chart: false
                  in_header: true
              - entity: input_number.alpha_rce_param_03
                name: Mój Próg
                unit: ' zł'
                show:
                  in_chart: false
                  in_header: true
              - entity: sensor.alpha_pse_dzisiaj_2
                name: Zarabiam
                type: column
                opacity: 0.4
                data_generator: >
                  const data = entity.attributes.value || entity.attributes.prices;
                  if (!data) return []; const p = parseFloat(hass.states['input_number.alpha_rce_param_03'].state) || 0.7; return data.map((entry) => {
                    const val = entry.rce_pln !== undefined ? entry.rce_pln : (entry.cen_cost !== undefined ? entry.cen_cost : (entry.price || 0));
                    return [new Date(String(entry.dtime).replace(' ', 'T')).getTime(), (parseFloat(val) / 1000) >= p ? (parseFloat(val) / 1000) : 0];
                  });
              - entity: sensor.alpha_pse_dzisiaj_2
                name: Ceny na dziś
                type: line
                curve: stepline
                data_generator: >
                  const data = entity.attributes.value || entity.attributes.prices;
                  if (!data) return []; return data.map((entry) => {
                    const val = entry.rce_pln !== undefined ? entry.rce_pln : (entry.cen_cost !== undefined ? entry.cen_cost : (entry.price || 0));
                    return [new Date(String(entry.dtime).replace(' ', 'T')).getTime(), parseFloat(val) / 1000];
                  });
          - type: entities
            title: Monitor Systemu
            show_header_toggle: false
            entities:
              - entity: input_text.alpha_rce_stan_01
                name: DECYZJA MÓZGU
                icon: mdi:brain
              - entity: input_text.alpha_rce_stan_03
                name: AKTUALNY STATUS
                icon: mdi:robot-outline
              - type: divider
              - entity: input_text.alpha_rce_stan_15
                name: STATUS LICENCJI
                icon: mdi:shield-key
              - entity: sensor.deye_inverter_battery_bms_soc
                name: Aktualny SOC Magazynu
              - entity: input_number.alpha_rce_param_20
                name: Docelowy SOC (Płotek)
          - type: entities
            title: Finanse i Zyski
            show_header_toggle: false
            entities:
              - entity: input_number.alpha_rce_param_44
                name: Zrealizowany (Miesiąc)
              - entity: input_number.alpha_rce_param_45
                name: Zrealizowany (Rok)
              - entity: input_number.alpha_rce_param_43
                name: Całkowity Zwrot (Total)

  # =============================================================
  # ZAKŁADKA 3: 🏠 DOM (Centrum Dowodzenia)
  # =============================================================
  - type: panel
    path: dom
    title: DOM
    icon: mdi:home
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              ## 📊 ALPHA HEMS: Status & Cel
              **🧠 Decyzja Mózgu:** {{ states('input_text.alpha_rce_stan_01') }}
              **⚙️ Aktualny Status:** {{ states('input_text.alpha_rce_stan_03') }}
              ---
              **Cel ładowania (Płotek):** {{ states('input_number.alpha_rce_param_20') }} %
              **Bieżąca cena RCE:** {{ states('input_number.alpha_rce_param_01') }} zł/kWh

          - type: markdown
            title: 🧠 Rentgen Decyzji
            content: >
              {% set cap_raw = states('number.deye_inverter_battery_capacity') | float(47.0) %}
              {% set cap = (cap_raw * 51.2 / 1000) | round(1) if cap_raw > 150 else cap_raw | round(1) %}
              {% set soc = states('sensor.deye_inverter_battery_bms_soc') | float(0) %}
              {% set plotek = states('input_number.alpha_rce_param_20') | float(20) %}
              {% set wolny_soc = [soc - plotek, 0] | max %}
              {% set wolna_energia = (wolny_soc / 100) * cap %}
              
              **Fizyka Magazynu:**
              - Energia do zrzutu: **{{ wolna_energia | round(2) }} kWh**
              - Aktualny zapas: **{{ soc }}%** (Cel: {{ plotek }}%)

          - type: entities
            title: ⚡ Monitoring Napięcia
            entities:
              - entity: sensor.deye_inverter_grid_l1_voltage
                name: Faza L1
              - entity: sensor.deye_inverter_grid_l2_voltage
                name: Faza L2
              - entity: sensor.deye_inverter_grid_l3_voltage
                name: Faza L3
              - type: section
              - entity: input_boolean.alpha_rce_flaga_10
                name: 🔄 WYMUŚ ALPHA SYNC / SETUP
